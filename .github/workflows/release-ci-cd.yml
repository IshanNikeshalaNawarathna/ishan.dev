name: CI/CD Release Pipeline

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
      - 'version*'
  pull_request:
    branches:
      - master

jobs:
  lint-and-build:
    name: Lint & Build Next.js App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Next.js App
        run: npm run build

  create-release:
    name: Create GitHub Release
    needs: lint-and-build
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build

      - name: Package Build Artifacts
        run: |
          tar -czf release-build.tar.gz .next public package.json package-lock.json next.config.ts

      - name: Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-build.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
