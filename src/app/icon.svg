<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090d16"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background with dark sleek gradient -->
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)" />
  <!-- Thin glowing border inside -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="none" stroke="url(#glowGrad)" stroke-width="1.5" stroke-opacity="0.9"/>
  <!-- Text representing "is." -->
  <text x="15" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">is<tspan fill="#60a5fa">.</tspan></text>
</svg>
